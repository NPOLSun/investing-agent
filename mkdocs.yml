site_name: Investing Agent
site_description: Mega Change Map 기반 투자 리서치 시스템 (methodology v2.3)
site_url: https://npolsun.github.io/investing-agent/
site_author: Sunyong
repo_url: https://github.com/NPOLSun/investing-agent
repo_name: NPOLSun/investing-agent
edit_uri: edit/main/

docs_dir: .
site_dir: site

# Phase 1: strict false 로 첫 배포 안전 확보. 안정화 후 true 로 전환 예정.
strict: false

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

exclude_docs: |
  .git/
  .github/
  .claude/
  scripts/
  data/
  digests/sent/
  site/
  .venv*/
  __pycache__/
  *.txt
  *.json
  requirements*.txt
  mkdocs.yml
  .gitignore

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans KR
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - ko
        - en
  - awesome-pages
  - redirects:
      redirect_maps: {}

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NPOLSun/investing-agent
