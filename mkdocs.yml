site_name: Investing Agent
site_description: Mega Change Map 기반 투자 리서치 시스템 (methodology v2.3)
site_url: https://npolsun.github.io/investing-agent/
site_author: Sunyong
repo_url: https://github.com/NPOLSun/investing-agent
repo_name: NPOLSun/investing-agent
docs_dir: docs
site_dir: site

# Workflow 가 build 직전에 markdown 파일들을 docs/ 로 stage. 원본 파일은 repo 루트 유지.
# 로컬에서 미리보기하려면: scripts/stage-docs.sh 또는 동일 작업 수동.

# Phase 1: strict false 로 첫 배포 안전 확보. 안정화 후 true 로 전환 예정.
strict: false

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

# edit_uri_template: docs/ prefix 없이 원본 파일 위치 가리킴
edit_uri_template: edit/main/{path}

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans KR
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - ko
        - en
  - redirects:
      redirect_maps: {}

nav:
  - 홈: index.md
  - 방법론:
    - methodology.md
    - "구버전 (v2.1 archive)": methodology_v2.1_archive.md
  - Megamap:
    - mega-change-map/00_dashboard.md
    - "구버전 Dashboard (v2.1)": mega-change-map/00_dashboard_v21_backup.md
  - Deep-Dive:
    - deepdive_index.md
    - "Tier 1 — Deep":
      - GLP-1 생태계: mega-change-map/tier1_glp1_ecosystem_v23.md
      - 원자력 르네상스: mega-change-map/tier1_nuclear_renaissance_v23.md
      - AI Foundation / Horizontal: mega-change-map/tier1_ai_foundation_horizontal_v23.md
      - AI Vertical / AI-native: mega-change-map/tier1_ai_vertical_v23.md
      - AI DC 전력 인프라: mega-change-map/tier1_ai_dc_power_infra_v23.md
      - K-조선 르네상스 ★ NEW: mega-change-map/tier1_kr_shipbuilding_renaissance_v23.md
    - "Tier 2 — Tier 1 깊이":
      - 차세대 전력반도체 (GaN·SiC): mega-change-map/tier2_power_semi_gan_sic_v23.md
      - 국방·드론: mega-change-map/tier2_defense_drones_v23.md
      - 데이터센터 냉각: mega-change-map/tier2_data_center_cooling_v23.md
      - 자율주행 / Robotaxi: mega-change-map/tier2_autonomous_driving_v23.md
      - 정밀 종양학 (ADC·CAR-T·RDC): mega-change-map/tier2_precision_oncology_v23.md
      - 휴머노이드 로봇: mega-change-map/tier2_humanoid_robot_v23.md
      - 광인터커넥트 (CPO): mega-change-map/tier2_optical_interconnect_cpo_v23.md
      - 우주 (위성·발사체): mega-change-map/tier2_space_v23.md
      - EV Battery + ESS ★ NEW: mega-change-map/tier2_battery_ess_v23.md
  - 워치리스트:
    - watchlist/00_first_watchlist_draft.md
    - "구버전 (v2.1)": watchlist/00_first_watchlist_draft_v21_backup.md
  - 캘린더:
    - calendar/00_event_calendar_6months.md
    - "구버전 (v2.1)": calendar/00_event_calendar_6months_v21_backup.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NPOLSun/investing-agent
